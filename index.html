<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>下載 App 測試版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="下載我們的應用程式測試版">
  <script>
    // 當頁面完全載入後執行
    document.addEventListener('DOMContentLoaded', function() {
      // 顯示載入動畫
      document.getElementById("loading").style.display = "block";
      
      // 設定一個計時器，確保頁面有時間呈現
      setTimeout(function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        console.log("用戶代理: " + ua); // 用於調試
        
        // 更精確的Android裝置檢測
        if (ua.toLowerCase().indexOf("android") > -1) {
          console.log("檢測到Android設備，正在轉址...");
          window.location.href = "https://play.google.com/apps/testing/org.iii.transcriber";
        } 
        // iOS裝置檢測
        else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
          console.log("檢測到iOS設備，正在轉址...");
          window.location.href = "https://testflight.apple.com/join/31JwQpF7";
        } 
        // 其他裝置顯示手動選擇
        else {
          console.log("無法自動檢測設備類型，顯示手動選擇");
          document.getElementById("loading").style.display = "none";
          document.getElementById("manual").style.display = "block";
        }
      }, 1000); // 延遲一秒，確保頁面載入完成
    });
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      background-color: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .app-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      display: block;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #0096ad;
    }
    
    p {
      margin-bottom: 25px;
      line-height: 1.5;
      color: #666;
    }
    
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      text-decoration: none;
      color: white;
      background-color: #0096ad;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 150, 173, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 150, 173, 0.4);
    }
    
    .btn-android {
      background-color: #3ddc84;
      color: #000;
    }
    
    .btn-ios {
      background-color: #007aff;
    }
    
    #loading {
      display: block;
    }
    
    #manual {
      display: none;
    }
    
    .spinner {
      border: 4px solid rgba(0, 150, 173, 0.2);
      border-top: 4px solid #0096ad;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .debug-info {
      font-size: 12px;
      color: #999;
      margin-top: 20px;
      display: none;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 20px;
      }
      
      .btn {
        display: block;
        margin: 15px auto;
        max-width: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="transcribe.png" alt="App 圖示" class="app-logo">
    
    <div id="loading">
      <h1>準備下載應用測試版</h1>
      <p>正在為您導向適合的測試版下載頁面，請稍候...</p>
      <div class="spinner"></div>
    </div>
    
    <div id="manual">
      <h1>下載應用測試版</h1>
      <p>請選擇您的設備類型以下載適合的測試版：</p>
      <a href="https://play.google.com/apps/testing/org.iii.transcriber" class="btn btn-android">Android 測試版</a>
      <a href="https://testflight.apple.com/join/31JwQpF7" class="btn btn-ios">iOS TestFlight</a>
      <p class="debug-info" id="debug-ua"></p>
      
      <script>
        // 顯示用戶代理資訊以便調試
        document.getElementById('debug-ua').textContent = "用戶代理: " + navigator.userAgent;
        document.getElementById('debug-ua').style.display = "block";
      </script>
    </div>
  </div>
</body>
</html>
