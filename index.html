<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>下載 AI會議助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="下載我們的AI會議助手應用程式">
  <script>
    // 當頁面完全載入後執行
    document.addEventListener('DOMContentLoaded', function() {
      // 顯示載入動畫
      document.getElementById("loading").style.display = "block";
      
      // 進度條動畫
      const progressBar = document.getElementById('progress-bar');
      const progressStatus = document.getElementById('progress-status');
      let progress = 0;
      
      // 進度條更新函數
      function updateProgress(value, statusText) {
        progress = value;
        progressBar.style.width = progress + '%';
        progressStatus.textContent = statusText;
      }
      
      // 初始進度
      updateProgress(10, '正在偵測裝置類型...');
      
      // 設定一個計時器，確保頁面有時間呈現
      setTimeout(function() {
        updateProgress(30, '辨識設備中...');
        
        setTimeout(function() {
          var ua = navigator.userAgent || navigator.vendor || window.opera;
          console.log("用戶代理: " + ua); // 用於調試
          
          updateProgress(50, '已確認設備類型');
          
          setTimeout(function() {
            updateProgress(70, '準備顯示裝置資訊');
            
            setTimeout(function() {
              updateProgress(100, '裝置偵測完成');
              
              // 隱藏載入畫面，先顯示裝置資訊
              document.getElementById("loading").style.display = "none";
              document.getElementById("device-info").style.display = "block";
              
              // 將偵測到的裝置資訊填入
              let deviceName = "未知";
              let iconUrl = "https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/help-circle.svg";
              let redirectUrl = "";
              let countdown = 3; // 倒數3秒
              
              // 更精確的Android裝置檢測
              if (ua.toLowerCase().indexOf("android") > -1) {
                console.log("檢測到Android設備");
                deviceName = "Android";
                iconUrl = "https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/smartphone.svg";
                redirectUrl = "https://play.google.com/apps/testing/org.iii.transcriber";
              } 
              // iOS裝置處理
              else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                console.log("檢測到iOS設備");
                deviceName = "iOS";
                iconUrl = "https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/apple.svg";
                redirectUrl = "https://testflight.apple.com/join/31JwQpF7";
              } 
              // 其他裝置顯示手動選擇
              else {
                console.log("無法自動檢測行動設備類型，顯示手動選擇");
                document.getElementById("device-info").style.display = "none";
                document.getElementById("manual").style.display = "block";
                
                // 檢測常見設備類型並顯示
                if (/Windows/.test(ua)) {
                  document.getElementById('manual-device-name').textContent = "Windows";
                  document.getElementById('manual-device-icon').src = "https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/monitor.svg";
                } else if (/Macintosh|Mac OS X/.test(ua)) {
                  document.getElementById('manual-device-name').textContent = "Mac";
                  document.getElementById('manual-device-icon').src = "https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/apple.svg";
                } else if (/Linux/.test(ua)) {
                  document.getElementById('manual-device-name').textContent = "Linux";
                  document.getElementById('manual-device-icon').src = "https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/terminal.svg";
                }
                return; // 不執行後續的轉址步驟
              }
              
              // 設置裝置資訊
              document.getElementById('device-name').textContent = deviceName;
              document.getElementById('device-icon').src = iconUrl;
              
              // 設置倒數計時顯示
              const countdownElement = document.getElementById('countdown');
              countdownElement.textContent = countdown;
              
              // 開始倒數計時然後轉址
              const countdownInterval = setInterval(function() {
                countdown--;
                countdownElement.textContent = countdown;
                
                if (countdown <= 0) {
                  clearInterval(countdownInterval);
                  // 延遲顯示後自動轉址到相應的下載頁面
                  window.location.href = redirectUrl;
                }
              }, 1000);
              
            }, 500); // 進度階段 4
          }, 500); // 進度階段 3
        }, 600); // 進度階段 2
      }, 800); // 進度階段 1
    });
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      background-color: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .app-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      display: block;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #0096ad;
    }
    
    p {
      margin-bottom: 25px;
      line-height: 1.5;
      color: #666;
    }
    
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      text-decoration: none;
      color: white;
      background-color: #0096ad;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 150, 173, 0.3);
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 150, 173, 0.4);
    }
    
    .btn-android {
      background-color: #3ddc84;
      color: #000;
    }
    
    .btn-ios {
      background-color: #007aff;
    }
    
    #loading {
      display: block;
    }
    
    #device-info {
      display: none;
    }
    
    #manual {
      display: none;
    }
    
    .spinner {
      border: 4px solid rgba(0, 150, 173, 0.2);
      border-top: 4px solid #0096ad;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    
    .progress-container {
      width: 100%;
      height: 10px;
      background-color: #f1f1f1;
      border-radius: 5px;
      margin: 20px 0;
      overflow: hidden;
    }
    
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #0096ad;
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    
    #progress-status {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      font-style: italic;
    }
    
    .debug-info {
      font-size: 12px;
      color: #999;
      margin-top: 20px;
      display: none;
    }
    
    .device-info-box {
      background-color: rgba(0, 150, 173, 0.08);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 25px;
    }
    
    .device-info-box h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #0096ad;
    }
    
    .device-type {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }
    
    .device-icon {
      width: 36px;
      height: 36px;
      margin-right: 15px;
      color: #0096ad;
    }
    
    #device-name, #manual-device-name {
      font-weight: bold;
      color: #0096ad;
      font-size: 20px;
    }
    
    .redirect-message {
      font-size: 16px;
      color: #0096ad;
      margin: 20px 0;
    }
    
    .countdown {
      display: inline-block;
      width: 30px;
      height: 30px;
      line-height: 30px;
      background-color: #0096ad;
      color: white;
      border-radius: 50%;
      margin: 0 5px;
      font-weight: bold;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 20px;
      }
      
      .btn {
        display: block;
        margin: 15px auto;
        max-width: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="transcribe.png" alt="AI會議助手" class="app-logo">
    
    <!-- 載入畫面 -->
    <div id="loading">
      <h1>準備下載 AI會議助手</h1>
      <p>正在為您導向適合的下載頁面，請稍候...</p>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p id="progress-status">正在偵測裝置類型...</p>
      <div class="spinner"></div>
    </div>
    
    <!-- 裝置資訊顯示 (先顯示再轉址) -->
    <div id="device-info">
      <h1>下載 AI會議助手</h1>
      <div class="device-info-box">
        <h2>已偵測到您的裝置</h2>
        <div class="device-type">
          <img src="" alt="裝置" class="device-icon" id="device-icon">
          <p><span id="device-name">裝置</span></p>
        </div>
        <p class="redirect-message">
          將在 <span class="countdown" id="countdown">3</span> 秒後自動前往下載頁面
        </p>
      </div>
    </div>
    
    <!-- 手動選擇 (只有非行動裝置會看到) -->
    <div id="manual">
      <h1>下載 AI會議助手</h1>
      <div class="device-info-box">
        <h2>已偵測到您的裝置</h2>
        <div class="device-type">
          <img src="" alt="裝置" class="device-icon" id="manual-device-icon">
          <p><span id="manual-device-name">裝置</span></p>
        </div>
        <p>請選擇您要下載的版本</p>
      </div>
      <a href="https://play.google.com/apps/testing/org.iii.transcriber" class="btn btn-android">Android 版下載</a>
      <a href="https://testflight.apple.com/join/31JwQpF7" class="btn btn-ios">iOS 版下載</a>
      <p class="debug-info" id="debug-ua"></p>
      
      <script>
        // 顯示用戶代理資訊以便調試
        document.getElementById('debug-ua').textContent = "用戶代理: " + navigator.userAgent;
        document.getElementById('debug-ua').style.display = "block";
      </script>
    </div>
  </div>
</body>
</html>
