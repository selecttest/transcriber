<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>下載 AI會議助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="下載我們的 AI會議助手">
  <script>
    // 當頁面完全載入後執行
    document.addEventListener('DOMContentLoaded', function() {
      // 顯示載入動畫
      document.getElementById("loading").style.display = "flex";
      
      // 設定一個計時器，確保頁面有時間呈現
      setTimeout(function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        
        // 更精確的Android裝置檢測
        if (ua.toLowerCase().indexOf("android") > -1) {
          startRedirectAnimation("https://play.google.com/apps/testing/org.iii.transcriber");
        } 
        // iOS裝置檢測
        else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
          startRedirectAnimation("https://testflight.apple.com/join/31JwQpF7");
        } 
        // 其他裝置顯示手動選擇
        else {
          setTimeout(function() {
            document.getElementById("loading").style.opacity = "0";
            setTimeout(function() {
              document.getElementById("loading").style.display = "none";
              document.getElementById("manual").style.display = "flex";
              setTimeout(function() {
                document.getElementById("manual").style.opacity = "1";
              }, 50);
            }, 500);
          }, 800);
        }
      }, 800);
    });

    // 轉址動畫函數
    function startRedirectAnimation(url) {
      // 添加進度條效果
      var progressBar = document.getElementById("progress-bar");
      var width = 1;
      var interval = setInterval(function() {
        if (width >= 100) {
          clearInterval(interval);
          document.getElementById("redirect-text").innerText = "正在前往下載頁面...";
          setTimeout(function() {
            window.location.href = url;
          }, 500);
        } else {
          width += 1;
          progressBar.style.width = width + "%";
        }
      }, 15);
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .container {
      max-width: 500px;
      width: 100%;
      background-color: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }
    
    .app-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 22px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      transform: translateY(0);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #0096ad;
    }
    
    p {
      margin-bottom: 25px;
      line-height: 1.5;
      color: #666;
    }
    
    .btn {
      display: inline-block;
      margin: 10px;
      padding: 14px 30px;
      text-decoration: none;
      color: white;
      background-color: #0096ad;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 150, 173, 0.3);
      position: relative;
      overflow: hidden;
    }
    
    .btn:after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease-out;
    }
    
    .btn:hover:after {
      width: 120%;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 7px 20px rgba(0, 150, 173, 0.4);
    }
    
    .btn-android {
      background-color: #3ddc84;
      color: #000;
    }
    
    .btn-ios {
      background-color: #007aff;
    }
    
    #loading {
      display: none;
      opacity: 1;
      transition: opacity 0.5s ease;
      flex-direction: column;
      align-items: center;
    }
    
    #manual {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      flex-direction: column;
      align-items: center;
    }
    
    .progress-container {
      width: 100%;
      height: 8px;
      background-color: #f3f3f3;
      border-radius: 4px;
      margin: 25px 0;
      overflow: hidden;
    }
    
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0096ad, #04c1df);
      border-radius: 4px;
      transition: width 0.1s linear;
    }
    
    .pulse {
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }
      
      h1 {
        font-size: 22px;
      }
      
      .btn {
        display: block;
        margin: 15px auto;
        max-width: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="transcribe.png" alt="AI會議助手圖示" class="app-logo">
    
    <div id="loading">
      <h1>準備下載 AI會議助手</h1>
      <p id="redirect-text">正在為您導向適合的下載頁面...</p>
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
    
    <div id="manual">
      <h1>下載 AI會議助手</h1>
      <p>請選擇您的設備類型以下載：</p>
      <a href="https://play.google.com/apps/testing/org.iii.transcriber" class="btn btn-android pulse">Android 下載</a>
      <a href="https://testflight.apple.com/join/31JwQpF7" class="btn btn-ios pulse">iOS 下載</a>
    </div>
  </div>
</body>
</html>
